<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🎓</span>
            Smart Attendance
        </div>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.endpoint == 'index' }}">Dashboard</a>
            <a href="/today" class="{{ 'active' if request.endpoint == 'today' }}">Today</a>
            <a href="/lectures" class="{{ 'active' if request.endpoint in ['lectures', 'lecture_detail'] }}">Lectures</a>
            <a href="/students" class="{{ 'active' if request.endpoint in ['students', 'student_detail'] }}">Students</a>
            <a href="/upload" class="{{ 'active' if request.endpoint == 'upload_page' }}">Upload</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
